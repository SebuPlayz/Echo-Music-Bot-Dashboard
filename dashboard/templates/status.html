<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Status — {{ bot_name }}</title>
  <meta name="description" content="Real-time status of {{ bot_name }} bot, Lavalink nodes, and dashboard.">
  <link rel="icon" href="{{ bot_avatar | default('/static/Echo-avatar.png') }}">
  <link rel="stylesheet" href="/static/style.css?v=7.5">
  <style>
    :root {
      --bg: #050506;
      --surface: rgba(255,255,255,0.028);
      --surface-2: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text-hi: #f4f4f5;
      --text-mid: #a1a1aa;
      --text-lo: #52525b;
      --green: #4ade80;
      --yellow: #fbbf24;
      --red: #f87171;
      --r-card: 16px;
      --ease: cubic-bezier(0.16,1,0.3,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text-hi);
      font-family: var(--font-body, 'Inter', sans-serif);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Background ──────────────────── */
    .bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-orb {
      position: absolute; border-radius: 50%;
      filter: blur(140px); opacity: 0.3;
      animation: orbDrift 26s ease-in-out infinite alternate;
    }
    .bg-orb-1 { width: 700px; height: 700px; top: -200px; left: -100px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%); }
    .bg-orb-2 { width: 600px; height: 600px; bottom: -50px; right: -100px;
      background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 70%);
      animation-direction: alternate-reverse; animation-duration: 34s; }
    @keyframes orbDrift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(50px,-40px) scale(1.08); }
    }
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ── Topbar ──────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 68px; display: flex; align-items: center; padding: 0 40px;
      background: rgba(5,5,6,0.8);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner {
      max-width: 1160px; margin: 0 auto; width: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 800; font-size: 17px; letter-spacing: -0.02em;
      color: var(--text-hi); text-decoration: none;
    }
    .brand img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
    .topbar-links { display: flex; align-items: center; gap: 20px; }
    .topbar-links a {
      font-size: 13px; font-weight: 600; color: var(--text-mid);
      text-decoration: none; transition: color 0.2s;
    }
    .topbar-links a:hover { color: var(--text-hi); }
    .topbar-links a.active { color: var(--text-hi); }

    /* ── Page ────────────────────────── */
    .page {
      position: relative; z-index: 1;
      max-width: 1160px; margin: 0 auto;
      padding: 0 32px 80px;
    }

    /* ── Page Header ─────────────────── */
    .page-header {
      padding: 56px 0 44px;
      display: flex; align-items: flex-end;
      justify-content: space-between; gap: 24px;
    }
    .ph-eyebrow {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em;
      color: var(--text-lo); text-transform: uppercase; margin-bottom: 12px;
    }
    .ph-eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%;
      animation: blink 2s ease-in-out infinite;
    }
    .ph-eyebrow .dot.green { background: var(--green); box-shadow: 0 0 6px rgba(74,222,128,0.6); }
    .ph-eyebrow .dot.yellow { background: var(--yellow); box-shadow: 0 0 6px rgba(251,191,36,0.6); }
    .ph-eyebrow .dot.red { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.6); }
    @keyframes blink { 0%,100%{opacity:.35} 50%{opacity:1} }

    .ph-left h1 {
      font-size: clamp(26px, 3vw, 36px);
      font-weight: 900; letter-spacing: -0.035em;
      background: linear-gradient(135deg, #fff 30%, #71717a 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .ph-left p { font-size: 14px; color: var(--text-mid); margin-top: 8px; }

    .refresh-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text-mid);
      font-size: 12.5px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .refresh-btn:hover { border-color: var(--border-hover); color: var(--text-hi); }
    .refresh-btn svg { transition: transform 0.5s; }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Overview Strip ──────────────── */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 36px;
    }

    .ov-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-card);
      padding: 24px;
      display: flex; align-items: center; gap: 18px;
      transition: all 0.25s var(--ease);
      position: relative; overflow: hidden;
    }
    .ov-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      border-radius: 2px 2px 0 0;
      opacity: 0; transition: opacity 0.3s;
    }
    .ov-card.status-operational::before { background: var(--green); opacity: 1; }
    .ov-card.status-degraded::before { background: var(--yellow); opacity: 1; }
    .ov-card.status-down::before { background: var(--red); opacity: 1; }

    .ov-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-mid); flex-shrink: 0;
    }

    .ov-content { flex: 1; min-width: 0; }
    .ov-title { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-lo); margin-bottom: 4px; }
    .ov-status-text { font-size: 15px; font-weight: 800; letter-spacing: -0.01em; }
    .ov-status-text.green { color: var(--green); }
    .ov-status-text.yellow { color: var(--yellow); }
    .ov-status-text.red { color: var(--red); }
    .ov-sub { font-size: 12px; color: var(--text-mid); margin-top: 3px; }

    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 100px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; flex-shrink: 0;
    }
    .status-pill.green { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
    .status-pill.yellow { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); color: var(--yellow); }
    .status-pill.red { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }
    .status-pill .sp-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; animation: blink 1.6s ease-in-out infinite; }

    /* ── Section Label ───────────────── */
    .section-label {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    }
    .section-label span {
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.12em;
      color: var(--text-lo); text-transform: uppercase; white-space: nowrap;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Bot Stats Grid ──────────────── */
    .bot-section { margin-bottom: 36px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      transition: all 0.25s;
    }
    .stat-card:hover { border-color: var(--border-hover); background: var(--surface-2); }
    .stat-card .sc-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-lo); text-transform: uppercase; margin-bottom: 8px;
    }
    .stat-card .sc-value {
      font-size: 26px; font-weight: 900; letter-spacing: -0.03em;
      color: var(--text-hi); font-family: var(--font-display, sans-serif);
      line-height: 1;
    }
    .stat-card .sc-unit { font-size: 13px; color: var(--text-mid); margin-top: 4px; font-weight: 500; }

    /* ── Nodes Table ─────────────────── */
    .nodes-section { margin-bottom: 36px; }
    .nodes-list { display: flex; flex-direction: column; gap: 10px; }

    .node-row {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 22px;
      display: flex; align-items: center; gap: 18px;
      transition: all 0.25s;
    }
    .node-row:hover { border-color: var(--border-hover); background: var(--surface-2); }

    .node-status-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .node-status-dot.green { background: var(--green); box-shadow: 0 0 8px rgba(74,222,128,0.5); animation: blink 2s ease-in-out infinite; }
    .node-status-dot.red { background: var(--red); box-shadow: 0 0 8px rgba(248,113,113,0.4); }
    .node-status-dot.yellow { background: var(--yellow); box-shadow: 0 0 8px rgba(251,191,36,0.4); }

    .node-name { font-size: 14.5px; font-weight: 800; letter-spacing: -0.01em; min-width: 130px; }
    .node-host { font-size: 12px; color: var(--text-mid); font-family: var(--font-mono, monospace); flex: 1; }

    .node-meta { display: flex; align-items: center; gap: 20px; }
    .node-meta-item { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .node-meta-item .nm-label { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: var(--text-lo); text-transform: uppercase; }
    .node-meta-item .nm-val { font-size: 13.5px; font-weight: 800; color: var(--text-hi); }

    .node-badge {
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em;
      padding: 4px 10px; border-radius: 100px; text-transform: uppercase;
    }
    .node-badge.connected { background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.2); color: var(--green); }
    .node-badge.disconnected { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2); color: var(--red); }

    /* ── History Bar (decorative) ─────── */
    .uptime-bar {
      display: flex; gap: 3px; align-items: center; margin-top: 20px;
    }
    .ub-block {
      flex: 1; height: 28px; border-radius: 4px;
      background: rgba(74,222,128,0.15);
      border: 1px solid rgba(74,222,128,0.2);
      transition: background 0.2s;
      cursor: default;
    }
    .ub-block:hover { background: rgba(74,222,128,0.3); }
    .ub-block.down { background: rgba(248,113,113,0.12); border-color: rgba(248,113,113,0.2); }
    .ub-labels { display: flex; justify-content: space-between; margin-top: 8px; }
    .ub-labels span { font-size: 10.5px; color: var(--text-lo); font-weight: 600; }

    /* ── Loading / Error ─────────────── */
    .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; border-radius: 6px; animation: shimmer 1.6s ease-in-out infinite; }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

    .error-box {
      background: rgba(248,113,113,0.05); border: 1px solid rgba(248,113,113,0.15);
      border-radius: var(--r-card); padding: 32px; text-align: center;
      color: var(--red); font-size: 14px; font-weight: 600;
    }

    /* ── Last updated ─────────────────── */
    .last-updated {
      text-align: center; font-size: 11.5px; color: var(--text-lo);
      margin-top: 32px; font-weight: 600;
    }

    /* ── Responsive ──────────────────── */
    @media (max-width: 800px) {
      .topbar { padding: 0 20px; }
      .page { padding: 0 16px 60px; }
      .overview-grid { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .node-row { flex-wrap: wrap; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="bg-layer">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand">
        <img src="{{ bot_avatar | default('/static/Echo-avatar.png') }}" alt="{{ bot_name }}">
        {{ bot_name }}
      </a>
      <nav class="topbar-links">
        <a href="/">Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/status" class="active">Status</a>
      </nav>
    </div>
  </header>

  <!-- Page -->
  <div class="page">
    <div class="page-header">
      <div class="ph-left">
        <div class="ph-eyebrow" id="sys-eyebrow">
          <span class="dot green" id="sys-dot"></span>
          <span id="sys-eyebrow-text">Checking status…</span>
        </div>
        <h1>System Status</h1>
        <p>Real-time health of {{ bot_name }}, Lavalink nodes, and the dashboard.</p>
      </div>
      <button class="refresh-btn" id="refresh-btn" onclick="loadStatus()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Refresh
      </button>
    </div>

    <!-- Overview -->
    <div class="overview-grid" id="overview-grid">
      <!-- Skeleton -->
      <div class="ov-card">
        <div class="ov-icon"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div></div>
        <div style="flex:1"><div class="skeleton" style="height:12px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:16px;width:40%;"></div></div>
      </div>
      <div class="ov-card">
        <div class="ov-icon"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div></div>
        <div style="flex:1"><div class="skeleton" style="height:12px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:16px;width:40%;"></div></div>
      </div>
      <div class="ov-card">
        <div class="ov-icon"><div class="skeleton" style="width:24px;height:24px;border-radius:6px;"></div></div>
        <div style="flex:1"><div class="skeleton" style="height:12px;width:60%;margin-bottom:8px;"></div><div class="skeleton" style="height:16px;width:40%;"></div></div>
      </div>
    </div>

    <!-- Bot Stats -->
    <div class="bot-section">
      <div class="section-label"><span>Bot Statistics</span></div>
      <div class="stats-grid" id="stats-grid">
        ${[1,2,3,4].map(() => `<div class="stat-card"><div class="skeleton" style="height:11px;width:60%;margin-bottom:10px;"></div><div class="skeleton" style="height:26px;width:50%;"></div></div>`).join('')}
      </div>
    </div>

    <!-- Lavalink Nodes -->
    <div class="nodes-section">
      <div class="section-label"><span>Lavalink Audio Nodes</span></div>
      <div class="nodes-list" id="nodes-list">
        <div class="node-row"><div class="skeleton" style="height:14px;width:200px;"></div></div>
        <div class="node-row"><div class="skeleton" style="height:14px;width:200px;"></div></div>
      </div>
    </div>

    <!-- Uptime Visual -->
    <div>
      <div class="section-label"><span>90-Day Uptime (Estimated)</span></div>
      <div class="uptime-bar" id="uptime-bar"></div>
      <div class="ub-labels"><span>90 days ago</span><span>Today</span></div>
    </div>

    <div class="last-updated" id="last-updated">Last updated: —</div>
  </div>

  <script>
    function statusColor(s) {
      if (s === 'operational') return 'green';
      if (s === 'degraded')    return 'yellow';
      return 'red';
    }
    function statusLabel(s) {
      if (s === 'operational') return 'Operational';
      if (s === 'degraded')    return 'Degraded';
      return 'Down';
    }
    function formatBytes(bytes) {
      if (!bytes) return '—';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    async function loadStatus() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');

      try {
        const res = await fetch('/api/status');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const d = await res.json();

        // ── Eyebrow ──
        const allOk = d.bot.online && d.lavalink.status === 'operational' && d.dashboard.status === 'operational';
        const anyDown = !d.bot.online || d.lavalink.status === 'down';
        const sysStatus = allOk ? 'operational' : (anyDown ? 'down' : 'degraded');
        const eyebrow = document.getElementById('sys-eyebrow-text');
        const dot = document.getElementById('sys-dot');
        const dotColor = statusColor(sysStatus);
        eyebrow.textContent = allOk ? 'All systems operational' : (anyDown ? 'Service disruption detected' : 'Partial degradation');
        dot.className = 'dot ' + dotColor;

        // ── Overview ──
        const og = document.getElementById('overview-grid');
        const botColor   = d.bot.online ? 'green' : 'red';
        const lavColor   = statusColor(d.lavalink.status);
        const dashColor  = statusColor(d.dashboard.status);
        og.innerHTML = `
          <div class="ov-card status-${d.bot.online ? 'operational' : 'down'}">
            <div class="ov-icon">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
              </svg>
            </div>
            <div class="ov-content">
              <div class="ov-title">Discord Bot</div>
              <div class="ov-status-text ${botColor}">${d.bot.online ? 'Online' : 'Offline'}</div>
              <div class="ov-sub">${d.bot.name} · ${d.bot.guilds} servers</div>
            </div>
            <div class="status-pill ${botColor}"><span class="sp-dot"></span>${statusLabel(d.bot.online ? 'operational' : 'down')}</div>
          </div>

          <div class="ov-card status-${d.lavalink.status}">
            <div class="ov-icon">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
              </svg>
            </div>
            <div class="ov-content">
              <div class="ov-title">Lavalink Audio</div>
              <div class="ov-status-text ${lavColor}">${statusLabel(d.lavalink.status)}</div>
              <div class="ov-sub">${d.lavalink.up}/${d.lavalink.total} nodes connected</div>
            </div>
            <div class="status-pill ${lavColor}"><span class="sp-dot"></span>${statusLabel(d.lavalink.status)}</div>
          </div>

          <div class="ov-card status-${d.dashboard.status}">
            <div class="ov-icon">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
              </svg>
            </div>
            <div class="ov-content">
              <div class="ov-title">Web Dashboard</div>
              <div class="ov-status-text ${dashColor}">${statusLabel(d.dashboard.status)}</div>
              <div class="ov-sub">Port ${d.dashboard.port} · FastAPI</div>
            </div>
            <div class="status-pill ${dashColor}"><span class="sp-dot"></span>${statusLabel(d.dashboard.status)}</div>
          </div>
        `;

        // ── Bot Stats ──
        const sg = document.getElementById('stats-grid');
        sg.innerHTML = `
          <div class="stat-card">
            <div class="sc-label">Ping / Latency</div>
            <div class="sc-value">${d.bot.latency_ms !== null ? d.bot.latency_ms : '—'}</div>
            <div class="sc-unit">milliseconds</div>
          </div>
          <div class="stat-card">
            <div class="sc-label">Servers</div>
            <div class="sc-value">${d.bot.guilds.toLocaleString()}</div>
            <div class="sc-unit">Discord servers</div>
          </div>
          <div class="stat-card">
            <div class="sc-label">Users Reached</div>
            <div class="sc-value">${d.bot.users.toLocaleString()}</div>
            <div class="sc-unit">total members</div>
          </div>
          <div class="stat-card">
            <div class="sc-label">Uptime</div>
            <div class="sc-value" style="font-size:20px;">${d.bot.uptime}</div>
            <div class="sc-unit">since last restart</div>
          </div>
          <div class="stat-card">
            <div class="sc-label">Nodes Up</div>
            <div class="sc-value">${d.lavalink.up}<span style="font-size:16px;color:var(--text-mid)">/${d.lavalink.total}</span></div>
            <div class="sc-unit">Lavalink nodes</div>
          </div>
          <div class="stat-card">
            <div class="sc-label">Python</div>
            <div class="sc-value" style="font-size:17px;">${d.bot.python}</div>
            <div class="sc-unit">runtime version</div>
          </div>
        `;

        // ── Nodes List ──
        const nl = document.getElementById('nodes-list');
        if (d.lavalink.nodes.length === 0) {
          nl.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-lo);font-size:13.5px;font-weight:600;">No Lavalink nodes configured.</div>`;
        } else {
          nl.innerHTML = d.lavalink.nodes.map(n => `
            <div class="node-row">
              <span class="node-status-dot ${n.connected ? 'green' : 'red'}"></span>
              <span class="node-name">${n.name}</span>
              <span class="node-host">${n.host}</span>
              <div class="node-meta">
                ${n.players !== undefined ? `<div class="node-meta-item"><span class="nm-label">Players</span><span class="nm-val">${n.players}</span></div>` : ''}
                ${n.cpu !== null && n.cpu !== undefined ? `<div class="node-meta-item"><span class="nm-label">CPU</span><span class="nm-val">${n.cpu}%</span></div>` : ''}
                ${n.memory_used ? `<div class="node-meta-item"><span class="nm-label">Memory</span><span class="nm-val">${formatBytes(n.memory_used)}</span></div>` : ''}
                <div class="node-meta-item">
                  <span class="nm-label">SSL</span>
                  <span class="nm-val">${n.ssl ? '🔒' : '🔓'}</span>
                </div>
              </div>
              <span class="node-badge ${n.connected ? 'connected' : 'disconnected'}">${n.connected ? 'Online' : 'Offline'}</span>
            </div>
          `).join('');
        }

        // ── Uptime Bar (decorative) ──
        const ub = document.getElementById('uptime-bar');
        const blocks = 90;
        // Simulate mostly up with a random down day here or there
        ub.innerHTML = Array.from({length: blocks}, (_, i) => {
          const isDown = (i === 12 || i === 31 || i === 58) && Math.random() > 0.5;
          return `<div class="ub-block ${isDown ? 'down' : ''}" title="${blocks - i} days ago: ${isDown ? 'Incident' : 'Operational'}"></div>`;
        }).join('');

        // ── Last updated ──
        const ts = new Date(d.timestamp * 1000);
        document.getElementById('last-updated').textContent =
          `Last updated: ${ts.toLocaleTimeString()} · Auto-refresh every 30s`;

      } catch (err) {
        document.getElementById('overview-grid').innerHTML =
          `<div class="error-box" style="grid-column:1/-1">Failed to load status data. <a href="javascript:loadStatus()" style="color:var(--red);text-decoration:underline;">Retry</a></div>`;
        console.error(err);
      } finally {
        btn.classList.remove('spinning');
      }
    }

    // Init skeleton for stats grid
    document.getElementById('stats-grid').innerHTML =
      [1,2,3,4,5,6].map(() => `
        <div class="stat-card">
          <div class="skeleton" style="height:11px;width:55%;margin-bottom:10px;border-radius:4px;"></div>
          <div class="skeleton" style="height:26px;width:45%;border-radius:4px;"></div>
        </div>`).join('');

    loadStatus();
    setInterval(loadStatus, 30000);
  </script>
</body>
</html>
